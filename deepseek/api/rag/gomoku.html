<body>
<div class="game-container">
    <div class="board-wrapper">
        <canvas id="gobanCanvas" width="600" height="600"></canvas>
    </div>
    <div class="panel">
        <div class="status-area">
            <div class="turn-indicator">
                <div class="piece-preview black-turn" id="turnPreview"></div>
                <span class="turn-text" id="turnText">黑棋走</span>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-undo" id="undoBtn">↩ 悔棋</button>
            <button class="btn btn-reset" id="resetBtn">⟳ 重新开始</button>
        </div>
    </div>
</div>

<!-- 获胜 Modal -->
<div class="modal-overlay" id="winModal">
    <div class="modal-card">
        <div class="modal-title">🏆 获胜！</div>
        <div class="modal-sub" id="winnerDisplay">
            <span class="modal-piece black" id="winnerPiece"></span>
            <span id="winnerText">黑棋</span>
        </div>
        <button class="modal-btn" id="modalResetBtn">再来一局</button>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gobanCanvas');
        const ctx = canvas.getContext('2d');
        const turnPreview = document.getElementById('turnPreview');
        const turnText = document.getElementById('turnText');
        const winModal = document.getElementById('winModal');
        const winnerPiece = document.getElementById('winnerPiece');
        const winnerText = document.getElementById('winnerText');
        const modalResetBtn = document.getElementById('modalResetBtn');

        // 棋盘配置
        const BOARD_SIZE = 15;          // 15x15 标准五子棋
        const CELL_SIZE = canvas.width / (BOARD_SIZE + 1); // 约 37.5px
        const OFFSET = CELL_SIZE;
        const RADIUS = CELL_SIZE * 0.42;

        // 状态
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        let currentPlayer = 'black'; // 'black' 或 'white'
        let history = [];            // 存储 { row, col, player }
        let gameOver = false;

        // 初始化
        function initBoard() {
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
            currentPlayer = 'black';
            history = [];
            gameOver = false;
            winModal.classList.remove('active');
            updateTurnUI();
            drawBoard();
        }

        // 绘制棋盘 (木质 + 高对比网格)
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 木质底色 (暖木色)
            const woodGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            woodGradient.addColorStop(0, '#d6b07a');
            woodGradient.addColorStop(0.3, '#c69c6b');
            woodGradient.addColorStop(0.7, '#b8895a');
            woodGradient.addColorStop(1, '#a67c4b');
            ctx.fillStyle = woodGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 木纹纹理 (细微杂色)
            ctx.save();
            ctx.globalAlpha = 0.07;
            for (let i = 0; i < 120; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.strokeStyle = '#3d2b1a';
                ctx.lineWidth = 1.5 + Math.random() * 4;
                ctx.stroke();
            }
            ctx.restore();

            // 绘制网格 (高对比深色线)
            ctx.strokeStyle = '#2c1b0e';
            ctx.lineWidth = 1.8;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 4;

            // 垂直线
            for (let i = 0; i < BOARD_SIZE; i++) {
                const x = OFFSET + i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(x, OFFSET);
                ctx.lineTo(x, OFFSET + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }

            // 水平线
            for (let i = 0; i < BOARD_SIZE; i++) {
                const y = OFFSET + i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(OFFSET, y);
                ctx.lineTo(OFFSET + (BOARD_SIZE - 1) * CELL_SIZE, y);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // 星位 (天元 + 小目)
            const starPoints = [
                [3, 3], [11, 3], [7, 7], [3, 11], [11, 11]
            ];
            ctx.fillStyle = '#2c1b0e';
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            starPoints.forEach(([col, row]) => {
                const x = OFFSET + col * CELL_SIZE;
                const y = OFFSET + row * CELL_SIZE;
                ctx.beginPath();
                ctx.arc(x, y, CELL_SIZE * 0.1, 0, 2 * Math.PI);
                ctx.fillStyle = '#3d2b1a';
                ctx.fill();
                ctx.fillStyle = '#1f1208';
                ctx.arc(x, y, CELL_SIZE * 0.06, 0, 2 * Math.PI);
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            // 绘制所有棋子 (带立体感)
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (!piece) continue;
                    const x = OFFSET + col * CELL_SIZE;
                    const y = OFFSET + row * CELL_SIZE;
                    drawPiece(x, y, piece);
                }
            }
        }

        // 绘制立体棋子 (CSS 风格阴影/渐变)
        function drawPiece(x, y, color) {
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 3;

            const gradient = ctx.createRadialGradient(x - 6, y - 6, 4, x, y, RADIUS * 1.3);
            if (color === 'black') {
                gradient.addColorStop(0, '#5a5a5a');
                gradient.addColorStop(0.3, '#2b2b2b');
                gradient.addColorStop(0.8, '#111111');
                gradient.addColorStop(1, '#050505');
            } else {
                gradient.addColorStop(0, '#fefefe');
                gradient.addColorStop(0.3, '#e0e0e0');
                gradient.addColorStop(0.7, '#b0b0b0');
                gradient.addColorStop(1, '#7a7a7a');
            }

            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, 2 * Math.PI);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 高光
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            const highlight = ctx.createRadialGradient(x - 5, y - 5, 2, x - 3, y - 3, RADIUS * 0.5);
            if (color === 'black') {
                highlight.addColorStop(0, 'rgba(200,200,200,0.25)');
                highlight.addColorStop(1, 'rgba(255,255,255,0)');
            } else {
                highlight.addColorStop(0, 'rgba(255,255,255,0.9)');
                highlight.addColorStop(1, 'rgba(255,255,255,0)');
            }
            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, 2 * Math.PI);
            ctx.fillStyle = highlight;
            ctx.fill();

            // 边缘柔光
            ctx.restore();
        }

        // 更新UI指示器
        function updateTurnUI() {
            if (gameOver) return;
            if (currentPlayer === 'black') {
                turnPreview.className = 'piece-preview black-turn';
                turnText.textContent = '黑棋走';
            } else {
                turnPreview.className = 'piece-preview white-turn';
                turnText.textContent = '白棋走';
            }
        }

        // 检查五子连线 (8方向)
        function checkWin(row, col, player) {
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
            for (const [dx, dy] of directions) {
                let count = 1;
                // 正方向
                for (let step = 1; step < 5; step++) {
                    const nr = row + dx * step;
                    const nc = col + dy * step;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] === player) count++; else break;
                }
                // 反方向
                for (let step = 1; step < 5; step++) {
                    const nr = row - dx * step;
                    const nc = col - dy * step;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] === player) count++; else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        // 处理落子
        function handlePlace(row, col) {
            if (gameOver) return false;
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
            if (board[row][col] !== null) return false;

            // 落子
            board[row][col] = currentPlayer;
            history.push({ row, col, player: currentPlayer });

            // 绘制
            drawBoard();

            // 检查胜利
            if (checkWin(row, col, currentPlayer)) {
                gameOver = true;
                const winner = currentPlayer;
                // 显示模态框
                winnerPiece.className = `modal-piece ${winner}`;
                winnerText.textContent = winner === 'black' ? '黑棋' : '白棋';
                winModal.classList.add('active');
                return true;
            }

            // 切换玩家
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            updateTurnUI();
            return true;
        }

        // 悔棋
        function undo() {
            if (gameOver) return;
            if (history.length === 0) return;

            const last = history.pop();
            board[last.row][last.col] = null;
            // 如果悔棋后当前玩家不变？实际上悔棋后应该回到上一手玩家
            // 但更合理：每次悔棋将 currentPlayer 设为上一步的玩家
            if (history.length > 0) {
                const prev = history[history.length - 1];
                currentPlayer = prev.player;
            } else {
                currentPlayer = 'black'; // 没有棋子时默认黑棋
            }
            drawBoard();
            updateTurnUI();
        }

        // 重置游戏
        function resetGame() {
            initBoard();
            drawBoard();
            winModal.classList.remove('active');
        }

        // 坐标转换 (canvas 点击 -> 格子)
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = (e.clientX || e.touches[0].clientX) - rect.left;
            const clientY = (e.clientY || e.touches[0].clientY) - rect.top;
            const canvasX = clientX * scaleX;
            const canvasY = clientY * scaleY;

            const col = Math.round((canvasX - OFFSET) / CELL_SIZE);
            const row = Math.round((canvasY - OFFSET) / CELL_SIZE);
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return null;
            // 检查距离是否在合理范围内 (防止点到格子空隙)
            const x = OFFSET + col * CELL_SIZE;
            const y = OFFSET + row * CELL_SIZE;
            const dist = Math.hypot(canvasX - x, canvasY - y);
            if (dist > CELL_SIZE * 0.45) return null;
            return { row, col };
        }

        // 事件监听
        function onCanvasClick(e) {
            e.preventDefault();
            if (gameOver) return;
            const pos = getGridPos(e);
            if (!pos) return;
            handlePlace(pos.row, pos.col);
        }

        canvas.addEventListener('click', onCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
            onCanvasClick(fakeEvent);
        }, { passive: false });

        // 按钮
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        modalResetBtn.addEventListener('click', resetGame);

        // 启动
        initBoard();
        drawBoard();
    })();
</script>
</body>
</html>
